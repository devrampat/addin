<!DOCTYPE html>
<html>
<head>
  <title>Productivity Suite</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <h3>Productivity Suite</h3>
  <button id="btnProcess">Process Email</button>
  <div id="status"></div>

  <script type="module">
    import { createNestablePublicClientApplication } from "@azure/msal-browser";

    const msalConfig = {
      auth: {
        clientId: "a1983fcd-e21e-43a4-9a38-6b9c2fa22f35",
        authority: "https://login.microsoftonline.com/<YOUR_TENANT_ID>",
        supportsNestedAppAuth: true  // ✅ NAA flag
      }
    };

    let pca;

    // ✅ Initialize Office + MSAL
    Office.onReady(async () => {
      pca = await createNestablePublicClientApplication(msalConfig);
      document.getElementById("btnProcess").onclick = processEmail;
    });

    async function getToken() {
      const tokenRequest = {
        scopes: ["Mail.Read"],
        loginHint: Office.context.mailbox.userProfile.emailAddress // ✅ NAA hint
      };

      try {
        // Try silent first
        const accounts = pca.getAllAccounts();
        if (accounts.length > 0) {
          return await pca.acquireTokenSilent({
            ...tokenRequest,
            account: accounts[0]
          });
        }
        // Fallback to popup
        return await pca.acquireTokenPopup(tokenRequest);
      } catch (err) {
        // Silent failed, try popup
        return await pca.acquireTokenPopup(tokenRequest);
      }
    }

    async function getMailContent(accessToken) {
      // Get current mail item ID from Office context
      const itemId = Office.context.mailbox.item.itemId;

      const response = await fetch(
        `https://graph.microsoft.com/v1.0/me/messages/${itemId}`,
        {
          headers: {
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": "application/json"
          }
        }
      );

      if (!response.ok) throw new Error("Graph API call failed");
      return await response.json();
    }

    async function sendToAWS(mailData, accessToken) {
      const response = await fetch("https://your-aws-api.amazonaws.com/process", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${accessToken}` // if your AWS service needs it
        },
        body: JSON.stringify({
          subject: mailData.subject,
          body: mailData.body.content,
          from: mailData.from.emailAddress.address,
          receivedAt: mailData.receivedDateTime
        })
      });

      if (!response.ok) throw new Error("AWS call failed");
      return await response.json();
    }

    async function processEmail() {
      const status = document.getElementById("status");
      try {
        status.innerText = "Authenticating...";

        // 1. Get token
        const tokenResponse = await getToken();
        const accessToken = tokenResponse.accessToken;
        status.innerText = "Got token. Fetching mail...";

        // 2. Get mail content
        const mailData = await getMailContent(accessToken);
        status.innerText = "Got mail. Sending to AWS...";

        // 3. Send to AWS
        const result = await sendToAWS(mailData, accessToken);
        status.innerText = "✅ Done! " + JSON.stringify(result);

      } catch (err) {
        status.innerText = "❌ Error: " + err.message;
        console.error(err);
      }
    }
  </script>
</body>
</html>
